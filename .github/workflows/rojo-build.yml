name: Rojo Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0

      - name: Install tools
        run: aftman install

      - name: Build with Rojo
        run: rojo build default.project.json --output /tmp/spacefishing.rbxlx
